name: "mcp-server ci-cd"
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
  IMAGE_MCP_SERVER: ghcr.io/${{ github.repository }}/mcp-server

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: echo ${{ github.repository }}
      - name: Docker build and push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t $IMAGE_MCP_SERVER:latest -f apps/mcp-server/Dockerfile .
          docker push $IMAGE_MCP_SERVER:latest
      - name: Deploy to k3s
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl apply -f k8s/mcp-server/
          kubectl rollout restart deployment/mcp-server -n default
